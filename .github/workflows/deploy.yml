name: Deploy

on:
  push:
    branches: [main]

env:
  VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN || 'pokemon-detective' }}
  VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION || 'us-east-1' }}
  VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Build client ──
      - run: npm ci
      - run: npm run build
        env:
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_REGION: ${{ env.VITE_COGNITO_REGION }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}

      # ── Build Lambdas ──
      - working-directory: api
        run: npm ci

      - name: Build handler Lambda
        working-directory: api
        run: npm run build:handler

      - name: Package Lambda
        working-directory: api
        run: |
          cp dist/handler.cjs dist/handler.js
          cd dist
          zip -r handler.zip handler.js

      # ── AWS auth ──
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Deploy client to S3 ──
      # Hashed Vite assets can be cached for a long time, but index.html must
      # always revalidate so clients pick up the newest asset filenames.
      - name: Deploy immutable client assets
        run: >
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/
          --delete
          --exclude "index.html"
          --cache-control "public,max-age=31536000,immutable"

      - name: Deploy non-cacheable app shell
        run: >
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html
          --cache-control "no-cache,no-store,must-revalidate"
          --content-type "text/html"

      # ── Deploy Lambdas ──
      - name: Deploy handler Lambda
        run: |
          aws lambda update-function-code \
            --function-name pokemon-detective-api \
            --zip-file fileb://api/dist/handler.zip

      # ── Invalidate CloudFront cache ──
      - run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/*"
