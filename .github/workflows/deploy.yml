name: Deploy

on:
  push:
    branches: [main]

env:
  VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN || 'pokemon-detective' }}
  VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION || 'us-east-1' }}
  VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Build client ──
      - run: npm ci
      - run: npm run build
        env:
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_REGION: ${{ env.VITE_COGNITO_REGION }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}

      # ── Build Lambdas ──
      - working-directory: api
        run: npm ci

      - name: Build handler Lambda
        working-directory: api
        run: npm run build:handler

      - name: Build authorizer Lambda
        working-directory: api
        run: npm run build:authorizer

      - name: Package Lambdas
        working-directory: api
        run: |
          mkdir -p dist
          cd dist
          zip -r handler.zip handler.js
          zip -r authorizer.zip authorizer.js

      # ── AWS auth ──
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Deploy client to S3 ──
      - run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete

      # ── Deploy Lambdas ──
      - name: Deploy handler Lambda
        run: |
          aws lambda update-function-code \
            --function-name pokemon-detective-api \
            --zip-file fileb://api/dist/handler.zip

      - name: Deploy authorizer Lambda
        run: |
          aws lambda update-function-code \
            --function-name pokemon-detective-authorizer \
            --zip-file fileb://api/dist/authorizer.zip

      # ── Invalidate CloudFront cache ──
      - run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/*"
