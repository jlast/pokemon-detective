name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        required: true
        default: test
        options:
          - test
          - prod

jobs:
  deploy:
    name: Deploy ${{ github.event_name == 'push' && 'test' || inputs.environment }}
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.event_name == 'push' && 'test' || inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'test' || inputs.environment }}
      VITE_COGNITO_DOMAIN: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_COGNITO_DOMAIN || 'pokemon-detective-test') || (secrets.PROD_COGNITO_DOMAIN || secrets.COGNITO_DOMAIN || 'pokemon-detective') }}
      VITE_COGNITO_REGION: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_AWS_REGION || secrets.AWS_REGION || 'us-east-1') || (secrets.PROD_AWS_REGION || secrets.AWS_REGION || 'us-east-1') }}
      VITE_COGNITO_CLIENT_ID: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_VITE_COGNITO_CLIENT_ID || secrets.VITE_COGNITO_CLIENT_ID) || (secrets.PROD_VITE_COGNITO_CLIENT_ID || secrets.VITE_COGNITO_CLIENT_ID) }}
      AWS_ACCESS_KEY_ID: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID) || (secrets.PROD_AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID) }}
      AWS_SECRET_ACCESS_KEY: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY) || (secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY) }}
      AWS_REGION: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_AWS_REGION || secrets.AWS_REGION || 'us-east-1') || (secrets.PROD_AWS_REGION || secrets.AWS_REGION || 'us-east-1') }}
      S3_BUCKET_NAME: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_S3_BUCKET_NAME || secrets.S3_BUCKET_NAME) || (secrets.PROD_S3_BUCKET_NAME || secrets.S3_BUCKET_NAME) }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID) || (secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID) }}
      LAMBDA_FUNCTION_NAME: ${{ (github.event_name == 'push' || inputs.environment == 'test') && (secrets.TEST_LAMBDA_FUNCTION_NAME || 'pokemon-detective-test-api') || (secrets.PROD_LAMBDA_FUNCTION_NAME || 'pokemon-detective-api') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Build client ──
      - run: npm ci
      - run: npm run build
        env:
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_REGION: ${{ env.VITE_COGNITO_REGION }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}

      # ── Build Lambdas ──
      - working-directory: api
        run: npm ci

      - name: Build handler Lambda
        working-directory: api
        run: npm run build:handler

      - name: Package Lambda
        working-directory: api
        run: |
          cp dist/handler.cjs dist/handler.js
          cd dist
          zip -r handler.zip handler.js

      # ── AWS auth ──
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy client to S3 ──
      # Hashed Vite assets can be cached for a long time, but index.html must
      # always revalidate so clients pick up the newest asset filenames.
      - name: Deploy immutable client assets
        run: >
          aws s3 sync dist/ s3://$S3_BUCKET_NAME/
          --delete
          --exclude "index.html"
          --cache-control "public,max-age=31536000,immutable"

      - name: Deploy non-cacheable app shell
        run: >
          aws s3 cp dist/index.html s3://$S3_BUCKET_NAME/index.html
          --cache-control "no-cache,no-store,must-revalidate"
          --content-type "text/html"

      # ── Deploy Lambdas ──
      - name: Deploy handler Lambda
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://api/dist/handler.zip

      # ── Invalidate CloudFront cache ──
      - run: >
          aws cloudfront create-invalidation
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID
          --paths "/*"
